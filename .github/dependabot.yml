version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "friday"
      time: "00:30"
    target-branch: "main"
    assignees:
      - "hibare"
    groups:
      actions:
        patterns:
          - "*"

  # Maintain dependencies for Python (uv)
  - package-ecosystem: "uv"
    directory: "/backend"
    schedule:
      interval: "monthly"
      day: "friday"
      time: "00:30"
    target-branch: "main"
    assignees:
      - "hibare"
    groups:
      python:
        patterns:
          - "*"

  # Maintain version for Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "friday"
      time: "00:30"
    target-branch: "main"
    assignees:
      - "hibare"
    groups:
      docker:
        patterns:
          - "*"

  # Maintain version for npm or yarn
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "monthly"
      day: "friday"
      time: "00:30"
    target-branch: "main"
    assignees:
      - "hibare"
    groups:
      npm:
        patterns:
          - "*"

  # Maintain dependencies for pre-commit
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "friday"
      time: "00:30"
    target-branch: "main"
    assignees:
      - "hibare"
    groups:
      pre-commit:
        patterns:
          - "*"
